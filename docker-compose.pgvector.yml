# PostgreSQL + pgvector，用于集成测试
# Usage: docker compose -f docker-compose.pgvector.yml up -d
services:
  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: entpy
      POSTGRES_PASSWORD: entpy
      POSTGRES_DB: entpy_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U entpy -d entpy_test"]
      interval: 5s
      timeout: 5s
      retries: 5
